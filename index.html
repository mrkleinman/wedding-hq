<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C1C1E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WeddingHQ" />
    <title>SIRALEONWEDDINGhq</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1C1C1E; }
      #root { min-height: 100vh; }
      #error-display { display: none; position: fixed; inset: 0; background: #1C1C1E; padding: 24px; overflow: auto; z-index: 9999; }
      #error-display h2 { color: #C41230; font-size: 18px; margin: 0 0 12px; }
      #error-display pre { background: #2C2C2E; color: #ff6b6b; padding: 16px; border-radius: 8px; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
    </style>
    <script type="module" crossorigin src="/wedding-hq/assets/index-C6M62Ne7.js"></script>
  </head>
  <body>
    <div id="error-display">
      <h2>⚠ App Error</h2>
      <pre id="error-text"></pre>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-text').textContent = (e.message || '') + '\n\n' + (e.filename || '') + ':' + e.lineno + '\n\n' + (e.error?.stack || '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-text').textContent = 'Unhandled Promise:\n' + (e.reason?.message || e.reason || '') + '\n\n' + (e.reason?.stack || '');
      });
    </script>
  </body>
</html>
